[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP", "SIM", "C90", "PLR0915", "RUF", "PIE", "PTH", "N", "PERF", "RET", "ERA", "S"]
ignore = ["E501", "S603", "S607"]

[tool.ruff.lint.isort]
known-first-party = ["agent_common"]

[tool.ruff.format]
quote-style = "double"
